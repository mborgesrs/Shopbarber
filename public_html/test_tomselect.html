<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Test TomSelect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-600 font-normal antialiased p-8">

      <div class="grid grid-cols-2 gap-3 mb-4">
          <div>
              <label class="block text-xs font-bold text-gray-700 mb-1">Pessoa</label>
              <select name="client_id" id="client_id" class="w-full border border-gray-200 p-2 rounded-lg text-xs focus:ring-2 focus:ring-blue-500 outline-none" required>
                  <option value="">Selecione uma pessoa...</option>
                  <option value="1">João Silva (11999999999)</option>
                  <option value="2">Maria Oliveira (11888888888)</option>
              </select>
          </div>
          <div>
              <label class="block text-xs font-bold text-gray-700 mb-1">Profissional</label>
              <select name="professional_id" id="professional_id" class="w-full border border-gray-200 p-2 rounded-lg text-xs focus:ring-2 focus:ring-blue-500 outline-none" required>
                  <option value="">Selecione um profissional...</option>
                  <option value="1">Carlos Barber</option>
                  <option value="2">Ana Stylist</option>
              </select>
          </div>
      </div>

      <div class="mb-4">
        <div class="bg-gray-50/50 p-3 rounded-xl mb-3 border border-gray-100">
            <div class="flex gap-2">
                <select id="productSelect" class="flex-1 border border-gray-200 p-2 rounded-lg text-xs focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="">-- Selecionar produto/serviço --</option>
                    <option value="1|50">Corte Masculino — R$ 50,00</option>
                    <option value="2|30">Barba — R$ 30,00</option>
                </select>
                <button type="button" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-blue-700 transition-colors flex items-center gap-2 shadow-sm shadow-blue-100">
                    Add
                </button>
            </div>
        </div>
      </div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    new TomSelect('#client_id',{create: false, sortField: {field: "text", direction: "asc"}});
    new TomSelect('#professional_id',{create: false, sortField: {field: "text", direction: "asc"}});
    new TomSelect('#productSelect',{create: false, sortField: {field: "text", direction: "asc"}});
});
</script>
</body>
</html>
